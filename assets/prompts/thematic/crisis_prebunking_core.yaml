          - "[Trigger 1]"
        response_time: "< 2 horas assessment"
        acciones[3]:
          - "[Acción 1]"
        responsables:
          lead: "[Rol]"
          comms: "[Rol]"
      
      - nivel: "Media (Alerta)"
        triggers[3-5]:
          - "[Trigger 1]"
        response_time: "< 30 min assessment, statement en 2-6 horas"
        acciones[4-5]:
          - "[Acción 1]"
        responsables:
          lead: "[Rol]"
          spokesperson: "[Rol]"
          writer: "[Rol]"
      
      - nivel: "Alta (Crisis Total)"
        triggers[3-5]:
          - "[Trigger 1]"
        response_time: "< 15 min assessment, war room en 2 horas"
        war_room_protocol:
          roles[6-7]:
            - rol: "[Rol]"
              responsabilidad: "[Qué hace]"
          update_frequency: "Cada 2-4 horas"
          decision_criteria: "[Cómo se toman decisiones]"
        acciones[6-8]:
          - "[Acción 1]"
  
  monitoring:
    keywords[10-15]:
      - "[Keyword 1 relacionado a policy]"
      - "[Keyword 2 relacionado a attack anticipado]"
    
    plataformas_priority[3-4]:
      - plataforma: "[Plataforma]"
        que_vigilar: "[Qué específicamente]"
