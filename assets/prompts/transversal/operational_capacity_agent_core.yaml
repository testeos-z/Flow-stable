    ## 1. Heatmap de Capacidad Operativa (Solo en SIMULACIONES FACTUM)

    **OBLIGATORIO EN SIMULACIONES**: Genera un heatmap en Mermaid mostrando el estado de capacidades por escenario (Base, Recomendado, Ambicioso).

    ### Dimensiones del heatmap:
    - **Ejes verticales**: Procesos, RR.HH., Gobernanza, Tecnología, Logística
    - **Estados (semáforo)**: Verde (≥80%) / Amarillo (50-79%) / Rojo (<50%)

    ### Formato de salida OBLIGATORIO:

    ```mermaid
    flowchart TD
        subgraph Base["Escenario Base"]
            P1["Procesos: 78%"]
            R1["RR.HH.: 65%"]
            G1["Gobernanza: 82%"]
            T1["Tecnología: 45%"]
            L1["Logística: 70%"]
        end
        subgraph Recomendado["Escenario Recomendado"]
            P2["Procesos: 85%"]
            R2["RR.HH.: 72%"]
            G2["Gobernanza: 88%"]
            T2["Tecnología: 60%"]
            L2["Logística: 80%"]
        end
        subgraph Ambicioso["Escenario Ambicioso"]
            P3["Procesos: 65%"]
            R3["RR.HH.: 55%"]
            G3["Gobernanza: 70%"]
            T3["Tecnología: 40%"]
            L3["Logística: 60%"]
        end

        style P1 fill:#FFC107,color:#000
        style R1 fill:#FFC107,color:#000
        style G1 fill:#4CAF50,color:#fff
        style T1 fill:#F44336,color:#fff
        style L1 fill:#FFC107,color:#000
        style P2 fill:#4CAF50,color:#fff
        style R2 fill:#FFC107,color:#000
        style G2 fill:#4CAF50,color:#fff
        style T2 fill:#FFC107,color:#000
        style L2 fill:#4CAF50,color:#fff
        style P3 fill:#FFC107,color:#000
        style R3 fill:#F44336,color:#fff
        style G3 fill:#FFC107,color:#000
        style T3 fill:#F44336,color:#fff
        style L3 fill:#FFC107,color:#000
    ```

    ### Micro-KPIs por dimensión:
    - **Procesos**: % digitalización, backlog promedio, SLA cumplimiento
    - **RR.HH.**: ratio equipo/beneficiarios, vacantes críticas, rotación
    - **Gobernanza**: frecuencia comités, decisiones pendientes, RACI definido
    - **Tecnología**: % integraciones activas, uptime, tickes pendientes
    - **Logística**: cobertura territorial, tiempo última milla, inventario

    ### Top 3 cuellos de botella + Acciones rápidas (≤90 días):
    1. **Cuello 1**: [Descripción] → Acción: [Acción específica]
    2. **Cuello 2**: [Descripción] → Acción: [Acción específica]
    3. **Cuello 3**: [Descripción] → Acción: [Acción específica]

    ### Análisis obligatorio (4-6 bullets):
    - **Fortaleza**: Dimensión con mejor capacidad
    - **Debilidad crítica**: Dimensión más deficiente
    - **Quick win**: Mejora de mayor impacto en ≤30 días
    - **Inversión necesaria**: Recurso clave faltante
    - **Riesgo de saturación**: Área en riesgo de colapso
    - **Próximo paso**: Acción inmediata prioritaria

    ---

    ## 2. Cronograma de Implementación (Gantt)

    **OBLIGATORIO**: Genera un diagrama Gantt en Mermaid con el cronograma de implementación por escenario.

    ### Formato de salida OBLIGATORIO:

    ```mermaid
    gantt
        title Cronograma de Implementación - Escenario [Base/Recomendado/Ambicioso]
        dateFormat  YYYY-MM-DD

        section Fase 1: Preparación
        Diseño operativo          :done, prep1, 2025-01-01, 30d
        Contratación RR.HH.       :active, prep2, after prep1, 45d
        Capacitación equipos      :prep3, after prep2, 30d

        section Fase 2: Piloto (90 días)
        Despliegue zona piloto    :crit, pil1, after prep3, 60d
        Evaluación y ajustes      :pil2, after pil1, 30d

        section Fase 3: Escalamiento
        Expansión territorial     :esc1, after pil2, 90d
        Integración sistemas      :esc2, after pil2, 120d

        section Hitos Clave
        Go-live piloto            :milestone, m1, after pil1, 0d
        Revisión trimestral       :milestone, m2, after esc1, 0d
    ```

    ### Elementos del Gantt:
    - **Hitos clave**: Marcados como milestone
    - **Camino crítico**: Tareas marcadas con :crit
    - **Dependencias**: Usar "after [tarea]"
    - **Sinergias inter-políticas**: Identificar conexiones con otras políticas

    ### Condiciones para pasar de fase:
    - **Fase 1 → Fase 2**: [Criterios específicos]
    - **Fase 2 → Fase 3**: [Criterios de escalamiento]

    ### Análisis obligatorio (4-6 bullets):
    - **Camino crítico**: Secuencia de tareas bloqueantes
    - **Hito más riesgoso**: Entregable con mayor incertidumbre
    - **Dependencia externa**: Factor fuera de control directo
    - **Buffer recomendado**: Margen de seguridad sugerido
    - **Entregable Q1**: Principal logro del primer trimestre
    - **Condición de éxito**: KPI clave para validar piloto

    ### Manejo de datos faltantes:
    - **1 variable faltante**: Renderiza con fechas estimadas marcando "[EST]"
    - **2+ variables faltantes**: NO renderizar. Listar qué falta y solicitar a: Agente Financiero (presupuesto), Agente Legal (permisos)

    ### Fuentes:
    Indicar cronogramas y planes consultados (ej: "Fuentes: Plan Operativo Anual, Convenio Marco")
