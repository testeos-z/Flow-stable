    ## Mapa/Trellis de Equidad Social y Territorial (Solo en SIMULACIONES FACTUM)

    **OBLIGATORIO EN SIMULACIONES**: Genera visualizaciones en Mermaid mostrando distribución de beneficios e inequidades por zonas y grupos sociales.

    ### Componente 1: Barras por Grupos Sociales

    Muestra beneficiarios vs. excluidos netos por grupo social para cada escenario.

    ### Formato de salida OBLIGATORIO:

    ```mermaid
    flowchart TD
        subgraph Grupos["Distribución por Grupo Social - Escenario [Base/Recomendado/Ambicioso]"]
            J[Jóvenes<br/>Beneficiarios: X<br/>Excluidos: Y]
            M[Mujeres<br/>Beneficiarios: X<br/>Excluidos: Y]
            Mi[Migrantes<br/>Beneficiarios: X<br/>Excluidos: Y]
            A[Adultos Mayores<br/>Beneficiarios: X<br/>Excluidos: Y]
            D[Discapacidad<br/>Beneficiarios: X<br/>Excluidos: Y]
            C[Clase Media<br/>Beneficiarios: X<br/>Excluidos: Y]
        end
    ```

    ### Componente 2: Mapa por Zonas/Barrios

    ```mermaid
    flowchart TD
        subgraph Zonas["Distribución por Zona - Escenario [Base/Recomendado/Ambicioso]"]
            N[Norte: Alto]
            Ce[Centro: Medio]
            S[Sur: Bajo]
            P[Periferia: Muy Bajo]
        end

        style J fill:#4CAF50,color:#fff
        style M fill:#4CAF50,color:#fff
        style Mi fill:#FFC107,color:#000
        style A fill:#FFC107,color:#000
        style D fill:#F44336,color:#fff
        style C fill:#4CAF50,color:#fff
        style N fill:#4CAF50,color:#fff
        style Ce fill:#FFC107,color:#000
        style S fill:#FF9800,color:#fff
        style P fill:#F44336,color:#fff
    ```

    ### Índices a calcular por zona:
    - **IIP (Índice de Incidencia Progresiva)**: % beneficio Bottom-40 / % poblacional
    - **RNB (Relación Necesidad-Beneficio)**: beneficio relativo / índice de necesidad
    - **Delta de acceso**: mejora en cobertura o tiempo de viaje

    ### Hotspots de Inequidad:
    Para cada zona/grupo con IIP < 1 o RNB < 1, identificar:
    - Localización exacta (barrio/sector)
    - Grupo afectado
    - Brecha específica (acceso, calidad, tiempo)
    - Compensación propuesta

    ### Análisis obligatorio (4-6 bullets):
    - **Grupo más beneficiado**: Quién gana más con la política
    - **Grupo más excluido**: Quién queda fuera o pierde
    - **Hotspot territorial**: Zona con mayor inequidad
    - **Compensación prioritaria**: Medida urgente para reducir brecha
    - **Riesgo de gentrificación**: Zonas en riesgo de desplazamiento
    - **Salvaguarda propuesta**: Mecanismo de protección recomendado

    ### Compensaciones propuestas:
    Para cada hotspot, proponer:
    - Cuotas/cupos específicos
    - Servicios móviles o puntos satélite
    - Tarifas diferenciadas
    - Ventanas de atención prioritaria
    - Soportes para brecha digital/idioma

    ### Manejo de datos faltantes:
    - **1 variable faltante**: Renderiza con proxy territorial y marca "[PROXY]"
    - **2+ variables faltantes**: NO renderizar. Solicitar a: Agente Financiero (inversión per cápita), Agente Operativo (cobertura)

    ### Fuentes:
    Indicar datos demográficos y territoriales (ej: "Fuentes: Censo 2020, Índice de Necesidad Municipal, SISBEN")
