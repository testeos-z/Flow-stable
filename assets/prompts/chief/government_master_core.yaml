    ## 1. Radar MCDA + Tarjeta de Score Global (Solo en SIMULACIONES FACTUM)

    **OBLIGATORIO EN SIMULACIONES**: Genera un gráfico radar MCDA por escenario integrando todas las evaluaciones de los agentes transversales.

    ### Dimensiones del radar (con riesgo invertido para visualización):
    - **Impacto** (35%): Transformación esperada
    - **Factibilidad** (30%): Legal + Financiera + Operativa
    - **Equidad** (15%): Social y territorial
    - **Riesgo invertido** (10%): 100 - riesgo (para visualización)
    - **Rapidez** (10%): Tiempo a resultados

    ### Formato de salida OBLIGATORIO:

    **OPCIÓN 1: Tabla de Score (Recomendada para precisión)**

    | Criterio | Peso | Base | Recomendado | Ambicioso |
    |----------|------|------|-------------|-----------|
    | Impacto | 35% | XX/35 | XX/35 | XX/35 |
    | Factibilidad | 30% | XX/30 | XX/30 | XX/30 |
    | Equidad | 15% | XX/15 | XX/15 | XX/15 |
    | Riesgo | 10% | XX/10 | XX/10 | XX/10 |
    | Rapidez | 10% | XX/10 | XX/10 | XX/10 |
    | **TOTAL** | **100%** | **XX/100** | **XX/100** | **XX/100** |
    | **DECISIÓN** | | [TIPO] | [TIPO] | [TIPO] |

    **OPCIÓN 2: QuadrantChart (Visualización 2D - Impacto vs Factibilidad)**

    ```mermaid
    quadrantChart
        title Score MCDA - Escenario [Base/Recomendado/Ambicioso]
        x-axis Bajo --> Alto
        y-axis Bajo --> Alto
        quadrant-1 Alto Impacto + Alta Factibilidad
        quadrant-2 Alto Impacto + Baja Factibilidad
        quadrant-3 Bajo Impacto + Baja Factibilidad
        quadrant-4 Bajo Impacto + Alta Factibilidad
        "Impacto (35%)": [0.8, 0.7]
        "Factibilidad (30%)": [0.6, 0.8]
        "Equidad (15%)": [0.7, 0.6]
        "Riesgo Inv (10%)": [0.5, 0.5]
        "Rapidez (10%)": [0.9, 0.7]
    ```

    **NOTA**: Usa la tabla para el score completo y el quadrantChart para visualización 2D.

    ### Tarjeta de Score Global:
    ```
    ┌─────────────────────────────────────────────────────┐
    │ SCORE GLOBAL MCDA                                   │
    ├──────────────┬──────────┬─────────────┬────────────┤
    │ Criterio     │ Peso     │ Base        │ Recomendado│
    ├──────────────┼──────────┼─────────────┼────────────┤
    │ Impacto      │ 35%      │ XX/35       │ XX/35      │
    │ Factibilidad │ 30%      │ XX/30       │ XX/30      │
    │ Equidad      │ 15%      │ XX/15       │ XX/15      │
    │ Riesgo       │ 10%      │ XX/10       │ XX/10      │
    │ Rapidez      │ 10%      │ XX/10       │ XX/10      │
    ├──────────────┼──────────┼─────────────┼────────────┤
    │ TOTAL        │ 100%     │ XX/100      │ XX/100     │
    │ DECISIÓN     │          │ [TIPO]      │ [TIPO]     │
    └──────────────┴──────────┴─────────────┴────────────┘

    🏆 ESCENARIO GANADOR: [Nombre] con [XX]/100 puntos
    ```

    ### Cálculo del Score (fórmula obligatoria):
    Score = (Impacto × 0.35) + (Factibilidad × 0.30) + (Equidad × 0.15) + (100-Riesgo × 0.10) + (Rapidez × 0.10)

    **NOTA**: El riesgo se usa SIN invertir en el cálculo final del score.

    ### Análisis obligatorio (4-6 bullets):
    - **Escenario ganador**: Cuál tiene mejor score y por qué
    - **Fortaleza principal**: Dimensión con mejor puntuación
    - **Cuello de botella**: Dimensión con peor puntuación
    - **Condición para aprobar**: Qué debe cumplirse
    - **Riesgo principal**: Mayor amenaza identificada
    - **Próximo paso**: Acción inmediata recomendada

    ---

    ## 2. Matriz de Riesgos (Impacto × Probabilidad)

    **OBLIGATORIO**: Genera una matriz de riesgos integrando aportes de Legal, Financiera, Operativa y otros agentes.

    ### Categorías de riesgo:
    - **Políticos**: Cambio de gobierno, oposición, conflictos
    - **Institucionales**: Capacidad, coordinación, resistencia
    - **Narrativos**: Percepción pública, medios, desinformación
    - **Económicos**: Inflación, tipo de cambio, recortes
    - **Operativos**: Ejecución, proveedores, sistemas

    ### Formato de salida OBLIGATORIO:

    ```mermaid
    quadrantChart
        title Matriz de Riesgos - Escenario [Base/Recomendado/Ambicioso]
        x-axis Baja Probabilidad --> Alta Probabilidad
        y-axis Bajo Impacto --> Alto Impacto
        quadrant-1 Monitorear de cerca
        quadrant-2 Riesgos críticos
        quadrant-3 Riesgos menores
        quadrant-4 Mitigar activamente
        "Riesgo político 1": [0.7, 0.8]
        "Riesgo institucional 1": [0.5, 0.6]
        "Riesgo económico 1": [0.3, 0.7]
        "Riesgo operativo 1": [0.6, 0.4]
        "Riesgo narrativo 1": [0.4, 0.5]
    ```

    ### Para cada riesgo en Top-5, especificar:
    - **Riesgo**: Descripción breve
    - **Categoría**: Político/Institucional/Narrativo/Económico/Operativo
    - **Probabilidad**: Alta/Media/Baja (o %)
    - **Impacto**: Alto/Medio/Bajo (o 1-10)
    - **Exposición**: P × I
    - **Mitigación**: Acción específica
    - **Dueño**: Responsable de mitigar

    ### Análisis obligatorio (4-6 bullets):
    - **Riesgo #1**: El más crítico y su mitigación
    - **Riesgo #2**: Segundo más crítico
    - **Riesgo #3**: Tercer más crítico
    - **Cluster de riesgos**: Categoría con más riesgos
    - **Quick win**: Riesgo más fácil de mitigar
    - **Plan de contingencia**: Acción si se materializa el riesgo #1

    ### Top-5 Riesgos con Plan de Mitigación:
    | # | Riesgo | Categoría | P | I | Exposición | Mitigación | Dueño |
    |---|--------|-----------|---|---|------------|------------|-------|
    | 1 | [...]  | [...]     |   |   | [...]      | [...]      | [...] |
    | 2 | [...]  | [...]     |   |   | [...]      | [...]      | [...] |
    | 3 | [...]  | [...]     |   |   | [...]      | [...]      | [...] |
    | 4 | [...]  | [...]     |   |   | [...]      | [...]      | [...] |
    | 5 | [...]  | [...]     |   |   | [...]      | [...]      | [...] |

    ### Manejo de datos faltantes:
    - **1 variable faltante**: Renderiza con estimación marcada "[EST]" y explica supuesto
    - **2+ variables faltantes**: NO renderizar. Listar qué falta y solicitar a: Agente Legal (riesgos jurídicos), Agente Financiero (riesgos económicos), Agente Operativo (riesgos de ejecución)

    ### Fuentes:
    Indicar agentes consultados (ej: "Fuentes: Agente Legal, Agente Financiero, Agente Operativo, Agente Social-Territorial")
