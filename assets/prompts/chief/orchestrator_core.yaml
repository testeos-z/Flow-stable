       - legal_regulatory_agent
       - financial_viability_agent
       - operational_capacity_agent
       - social_territorial_impact_agent
    3. 🚨 **ACTIVA TODOS los agentes temáticos** listados en `valid_agent_names` - NO selecciones un subconjunto
    4. Genera TODOS los steps (S1 a S7) siguiendo la estructura del ejemplo
    5. Incluye MCDA con pesos estándar: 35-30-15-10-10
    6. Define 2-3 alternativas en `alternatives_portfolio`

    🚨 **CAMPOS OBLIGATORIOS QUE DEBES INCLUIR AL INICIO** 🚨

    DESPUÉS de los campos de metadata (object, version, methodology, etc.),
    DEBES incluir estos 3 campos ANTES de cualquier otro.

