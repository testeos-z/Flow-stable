      decision_criteria: MCDA_35_30_15_10_10
      veto_rules_applied: true
      evidence_quality: documented_with_proxies
      anti_hallucination: no_invented_data_sources
    expected_deliverables[3]:
      - name: agora_json_payload
        format: json
