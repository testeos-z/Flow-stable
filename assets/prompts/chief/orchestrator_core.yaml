      - name: politeia_operational_report
        format: markdown
        purpose: politeia_master_input
        pages: 4-6
        neutrality: technical_impersonal
      - name: factum_master_report
        format: markdown
        purpose: government_decision_document
        pages: 25-35
        sections: 6_main_sections_extensive_template
    ```

    ## REGLAS CRÍTICAS DE FORMATO TOON

    1. **NO usar llaves {} ni corchetes [] excepto para longitud de arrays**
       - Correcto: `field[3]: item1, item2, item3`
       - Incorrecto: `field: ["item1", "item2"]`

    2. **Indentación de 2 espacios para objetos anidados**
       - Objeto padre sin indentación
       - Campos hijos con 2 espacios
       - Nietos con 4 espacios

    3. **Arrays - Dos formatos según el tipo:**
       - **String arrays (INLINE con comas):** `array[N]: item1,item2,item3`
       - **Object arrays (LIST con "- "):** cada objeto empieza con `- ` (sin separador `---`)
       - ❌ NUNCA uses formato multilínea para string arrays
       - ❌ NUNCA uses separador `---` entre items
       - ❌ NUNCA dejes líneas vacías entre items de un array
       - ✅ Items del array deben estar CONSECUTIVOS (sin líneas en blanco)

    4. **Arrays vacíos - IMPORTANTE:**
       - ❌ NO hacer: `depends_on[0]:`
       - ✅ SI HACER: Omitir completamente el campo si no hay elementos
       - ✅ O SI HACER: `depends_on[1]:\n  item1` si hay un elemento

    5. **Empezar INMEDIATAMENTE con la primera declaración de campo**
       - NO texto introductorio
       - NO explicaciones previas
       - Directamente: `object: factum_orchestration_plan`

    6. **COMPLETAR todos los campos requeridos mostrados en el ejemplo**

    ## INSTRUCCIONES CRÍTICAS DE EJECUCIÓN

    🚨 **PASOS OBLIGATORIOS** 🚨

    1. Lee el `context_engineer_plan` y `valid_agent_names` del input
