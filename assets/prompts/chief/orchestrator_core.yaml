    required_agents:
      mandatory_transversal[4]: legal_regulatory_agent,financial_viability_agent,operational_capacity_agent,social_territorial_impact_agent
      selected_thematic[17]: economic_agent,industry_agent,health_agent,education_agent,inclusion_agent,housing_territory_agent,mobility_agent,urban_services_agent,public_space_agent,environment_agent,security_public_agent,transparency_agent,digital_transformation_agent,public_admin_agent,macro_fiscal_agent,security_national_agent,foreign_relations_agent
      selection_rationale: Todos los agentes temáticos activados para análisis integral completo - activación completa obligatoria
    objectives[4]: Construcción Context-Pack territorial completo,Modelado Árbol del Problema con causas-efectos,Pre-diagnósticos especializados de agentes v0.5,Deliberación MCDA con reglas de veto aplicadas
    transversal_agents_required[4]: legal_regulatory_agent,financial_viability_agent,operational_capacity_agent,social_territorial_impact_agent
    thematic_agents[17]: economic_agent,industry_agent,health_agent,education_agent,inclusion_agent,housing_territory_agent,mobility_agent,urban_services_agent,public_space_agent,environment_agent,security_public_agent,transparency_agent,digital_transformation_agent,public_admin_agent,macro_fiscal_agent,security_national_agent,foreign_relations_agent
    steps[7]:
      - id: S1
      phase: context_pack_construction
      name: Construcción Context-Pack territorial
      agent: orchestrator
      inputs:
        territory_data: Datos demográficos y económicos de Madeira (INE, SRE, Eurostat)
        problem_context: Análisis de inflación local
      outputs:
        context_pack: Pack institucional, fiscal, social y territorial completo
      success_criteria[2]: Context pack completo con 6 dimensiones,Supuestos documentados explícitamente

      - id: S2
      phase: problem_tree_modeling
      name: Modelado Árbol del Problema
      agent: orchestrator
      inputs:
        effects: Efectos observados de inflación
        hypotheses: Causas percibidas identificadas
        evidence: Datos disponibles de precios y consumo
      outputs:
        problem_tree: Relaciones causa-efecto mapeadas
        evidence_gaps: Brechas de datos identificadas
