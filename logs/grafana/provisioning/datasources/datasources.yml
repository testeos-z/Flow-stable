# Grafana datasource provisioning
# See: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
apiVersion: 1

# Mark provisioned data sources for deletion if removed from this file.
prune: false

# List of data sources to insert/update depending on what's available.
datasources:
    - name: Loki
      type: loki
      access: direct
      orgId: 1
      uid: grafana_lokiq
      url: $LOKI_INTERNAL_URL
      user:
      database:
      basicAuth:
      basicAuthUser:
      withCredentials:
      isDefault: true

    - name: Prometheus
      type: prometheus
      access: proxy
      orgId: 1
      uid: grafana_prometheus
      url: $PROMETHEUS_INTERNAL_URL
      user:
      database:
      basicAuth:
      basicAuthUser:
      withCredentials:
      isDefault: false

    - name: Tempo
      type: tempo
      access: proxy
      orgId: 1
      uid: grafana_tempo
      url: $TEMPO_INTERNAL_URL
      user:
      database:
      basicAuth:
      basicAuthUser:
      withCredentials:
      isDefault: false
