global:
    scrape_interval: 15s # Default scrape interval

scrape_configs:
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    # Flowise metrics — scraped via Railway internal network
    - job_name: 'flowise'
      scrape_interval: 15s
      metrics_path: '/api/v1/metrics'
      scheme: http
      authorization:
          type: Bearer
          credentials_file: '/run/secrets/flowise_api_key'
      static_configs:
          - targets: ['flow-stable-flow.railway.internal:3000']
