global:
    scrape_interval: 15s # Default scrape interval

scrape_configs:
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    # Flowise metrics — cross-environment scrape (Prometheus=logs, Flowise=flow)
    # Uses public Railway URL since internal DNS is per-environment
    - job_name: 'flowise'
      scrape_interval: 15s
      metrics_path: '/api/v1/metrics'
      scheme: https
      authorization:
          type: Bearer
          credentials: '4QYJLQHkwYyE4fU9qCVSpiTwonAxhYLDaiAOf5zkEFs'
      static_configs:
          - targets: ['flow-stable-flow.up.railway.app']
