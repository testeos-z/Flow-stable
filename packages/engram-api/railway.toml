# Railway Config-as-Code for Engram REST API Gateway
# This service connects to Engram Cloud (a separate Railway service
# pointing to Gentleman-Programming/engram repo).
#
# Set the "Config File Path" in Railway service settings to:
#   packages/engram-api/railway.toml
#
# REQUIRED env vars (set in Railway dashboard):
#   ENGRAM_URL  = URL of the engram-cloud service (e.g., https://engram-cloud-production.up.railway.app)
#   PORT        = 7438 (Railway will override with its own if needed)

[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
numReplicas = 1
